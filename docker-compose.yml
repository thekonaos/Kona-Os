version: "3.9"
services:
  oracle:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - oracle
